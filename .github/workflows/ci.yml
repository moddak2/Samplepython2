name: ci

on:
  push:
  pull_request:

jobs:
  test-build-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Create venv
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: |
          . .venv/bin/activate
          python -m pytest

      - name: Build package
        run: |
          . .venv/bin/activate
          python -m build

      - name: Security scan (training)
        run: ./scripts/run_security_scan.sh

      - name: Upload dist artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
